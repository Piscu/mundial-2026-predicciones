<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 - Predicciones</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <div>
        <h1 class="logo">⚽ Mundial 2026</h1>
        <p class="subtitle">Resultados, Predicciones y Cuotas</p>
      </div>
      <button class="btn-sugerencia" id="btn-sugerencia" title="Enviar sugerencia">Enviar Sugerencia</button>
    </div>
  </header>

  <nav class="tabs">
    <div class="container">
      <button class="tab active" data-tab="fixtures">Partidos</button>
      <button class="tab" data-tab="standings">Grupos</button>
      <button class="tab" data-tab="predictions">Predicciones</button>
      <button class="tab" data-tab="odds">Cuotas</button>
      <button class="tab" data-tab="advanced">🔬 Predicción</button>
    </div>
  </nav>

  <main class="container">
    <div class="tab-content active" id="tab-fixtures">
      <div class="filters">
        <button class="filter-btn active" data-status="all">Todos</button>
        <button class="filter-btn" data-status="NS">Programados</button>
        <button class="filter-btn" data-status="live">En Vivo</button>
        <button class="filter-btn" data-status="FT">Finalizados</button>
      </div>
      <div id="fixtures-list" class="matches-list"></div>
    </div>

    <div class="tab-content" id="tab-standings">
      <div id="standings-view"></div>
    </div>

    <div class="tab-content" id="tab-predictions">
      <div class="tab-header">
        <p class="section-desc">Análisis y predicciones para cada partido del Mundial</p>
        <button class="btn btn-refresh" data-tab="predictions">🔄 Actualizar</button>
      </div>
      <div id="predictions-list" class="matches-list"></div>
    </div>

    <div class="tab-content" id="tab-advanced">
      <div class="tab-header">
        <p class="section-desc">Predicción mejorada con rating Elo y estadísticas</p>
        <button class="btn btn-refresh" data-tab="advanced" id="btn-refresh-advanced">🔄 Actualizar</button>
        <button class="btn btn-refresh" id="btn-sync-elo" style="border-color:var(--accent);color:var(--accent)">⭐ Sincronizar Elo</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <select id="sel-home-team" style="flex:1;min-width:140px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text)"></select>
        <span style="font-weight:700;color:var(--text2)">vs</span>
        <select id="sel-away-team" style="flex:1;min-width:140px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text)"></select>
        <button class="btn btn-primary" id="btn-predict-matchup" style="padding:8px 16px">Predecir</button>
      </div>
      <div id="matchup-result" style="margin-bottom:16px"></div>
      <div id="advanced-list" class="matches-list"></div>
    </div>

    <div class="tab-content" id="tab-odds">
      <div class="tab-header">
        <p class="section-desc">Cuotas de apuestas para los partidos del Mundial</p>
        <button class="btn btn-refresh" data-tab="odds">🔄 Actualizar</button>
      </div>
      <div id="odds-list" class="matches-list"></div>
    </div>
  </main>

  <div id="match-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="sugerencia-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-sugerencia">
      <button class="modal-close">&times;</button>
      <h3>💡 Sugerencia</h3>
      <p style="color:var(--text2);font-size:0.9rem;margin-bottom:12px">¿Qué te gustaría mejorar o agregar?</p>
      <textarea id="sugerencia-text" class="sugerencia-input" rows="4" placeholder="Escribí tu sugerencia..." maxlength="1000"></textarea>
      <input id="sugerencia-contacto" class="sugerencia-input" type="text" placeholder="Tu contacto (opcional)" maxlength="100">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary" id="btn-enviar-sugerencia" style="flex:1">Enviar</button>
        <button class="btn btn-cancel" id="btn-cancelar-sugerencia">Cancelar</button>
      </div>
      <div id="sugerencia-status" style="margin-top:8px;font-size:0.85rem;text-align:center"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>Datos proporcionados por <a href="https://api-sports.io" target="_blank">API-Football</a></p>
      <p style="margin-top:8px"><button class="btn-sugerencia" id="btn-sugerencia-footer" title="Enviar sugerencia">Enviar Sugerencia 💡</button></p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
